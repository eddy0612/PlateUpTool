<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Warm orange background tile -->
  <rect width="32" height="32" rx="5" fill="#1A5FB4"/>

  <!-- Fork (left) -->
  <!-- Three tines -->
  <line x1="3.2" y1="4"  x2="3.2" y2="12" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="5.0" y1="4"  x2="5.0" y2="12" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="6.8" y1="4"  x2="6.8" y2="12" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Handle (thicker, merges tines) -->
  <line x1="5.0" y1="11" x2="5.0" y2="28" stroke="white" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Knife (right) -->
  <!-- Blade: sharp inner curve -->
  <path d="M25.5 4 L27.5 4 C30 8 29 13 25.5 14 Z" fill="white"/>
  <!-- Handle -->
  <line x1="26.5" y1="14" x2="26.5" y2="28" stroke="white" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Plate: outer disc -->
  <circle cx="16" cy="16" r="7.8" fill="white"/>
  <!-- Plate: inner rim line -->
  <circle cx="16" cy="16" r="5.3" fill="none" stroke="#1A5FB4" stroke-width="1.1"/>
</svg>
